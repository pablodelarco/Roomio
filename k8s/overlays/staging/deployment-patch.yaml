apiVersion: apps/v1
kind: Deployment
metadata:
  name: roomio-frontend
spec:
  template:
    spec:
      # Staging: Pin to worker node
      nodeSelector:
        kubernetes.io/hostname: worker
      containers:
      - name: frontend
        env:
        - name: NODE_ENV
          value: "production"
        - name: ENVIRONMENT
          value: "staging"
        resources:
          requests:
            memory: "64Mi"  # Production-like resources
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
