apiVersion: apps/v1
kind: Deployment
metadata:
  name: roomio-frontend
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    spec:
      # Production: No node selector for best distribution
      nodeSelector:
        kubernetes.io/hostname: worker
      containers:
      - name: frontend
        env:
        - name: NODE_ENV
          value: "production"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "128Mi"  # Higher resources for production
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
